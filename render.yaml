services:
  - type: web
    name: tnb-ops-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DEV_BYPASS_AUTH
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      # Mật khẩu truy cập dashboard (thay cho GHN SSO) — điền trên Render dashboard,
      # nếu để trống code sẽ dùng mặc định "danhtng2026" trong server.js.
      - key: ACCESS_PASSWORD
        sync: false
      # GTalk
      - key: GTALK_BASE_URL
        sync: false
      - key: GTALK_USERNAME
        sync: false
      - key: GTALK_PASSWORD
        sync: false
      - key: GTALK_OA_ID
        sync: false
      - key: GTALK_CHANNEL_ID
        sync: false
      - key: GTALK_WEBHOOK_SECRET
        sync: false
      - key: ALERT_CRON
        value: "30 8 * * *"
      - key: DASHBOARD_URL
        sync: false
